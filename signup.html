<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - IAP Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-brand">Industry Academia Portal</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Log In</a>
        </div>
        <div class="nav-cta">
            <a class="btn btn-secondary" href="login.html">Sign In</a>
        </div>
    </nav>

    <main class="page-wrap auth-page">
        <section class="auth-card card">
            <span class="eyebrow">Create Account</span>
            <h1>Join the portal</h1>
            <p>Sign up using your details to access projects, mentorship, and certifications.</p>
            <div id="pageAlert" class="alert alert-info"></div>
            <form id="signupForm" class="action-panel">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="10 digit phone number" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="role">Role</label>
                        <select id="role" required>
                            <option value="">Select your role</option>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="company">Company</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="organization">Organization</label>
                        <input type="text" id="organization" placeholder="Organization name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="college">College</label>
                    <input type="text" id="college" placeholder="College name or institution" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            <div class="divider"><span>Already have an account?</span></div>
            <div class="link-group">
                <p>Go back to <a href="login.html">Sign In</a></p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
