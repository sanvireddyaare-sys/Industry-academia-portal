<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - IAP Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-brand">Industry Academia Portal</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="projects.html">Projects</a>
            <a href="courses.html">Courses</a>
            <a href="tests.html">Tests</a>
            <a href="events.html">Events</a>
            <a href="profile.html">Profile</a>
        </div>
        <button id="logoutBtn" class="btn btn-ghost">Logout</button>
    </nav>

    <main class="page-wrap">
        <div id="pageAlert" class="alert alert-info"></div>

        <section class="page-header">
            <div>
                <span class="eyebrow">Profile</span>
                <h1>Your account details</h1>
                <p>Keep your academic profile up to date and share your portfolio with recruiters.</p>
            </div>
        </section>

        <section class="content-grid">
            <div class="profile-panel card">
                <h2>Account details</h2>
                <div id="profileDetails" class="panel-list"></div>
            </div>
            <div class="profile-panel card">
                <h2>Resume & Portfolio</h2>
                <form id="resumeForm" class="action-panel">
                    <label for="resumeFile">Upload Resume</label>
                    <input type="file" id="resumeFile" accept=".pdf,.doc,.docx" />
                    <button type="submit" class="btn btn-primary">Upload Resume</button>
                </form>

                <form id="portfolioForm" class="action-panel">
                    <label for="portfolioTitle">Portfolio title</label>
                    <input type="text" id="portfolioTitle" placeholder="Project or certificate title" />
                    <label for="portfolioDescription">Description</label>
                    <textarea id="portfolioDescription" placeholder="Describe the item"></textarea>
                    <label for="portfolioLink">Link</label>
                    <input type="url" id="portfolioLink" placeholder="https://" />
                    <button type="submit" class="btn btn-secondary">Add portfolio item</button>
                </form>

                <div id="resumeDisplay" class="panel-list"></div>
                <div id="portfolioList" class="panel-list"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
